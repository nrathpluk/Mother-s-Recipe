<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Mother's Recipe</title>
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Google Identity Services SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="auth-page">

  <nav class="navbar">
    <a href="/index.html" class="nav-logo" data-i18n="nav.logo">🍲 Mother's Recipe</a>
    <div id="nav-links"></div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <h1 data-i18n="login.title">Welcome back 👋</h1>
      <p class="auth-subtitle" data-i18n="login.subtitle">Sign in to share and save your favorite recipes.</p>

      <!-- Error message shown on failed login -->
      <p id="error-msg" class="msg error" style="display:none;"></p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username" data-i18n="login.username_label">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username"
            placeholder="your_username"
            data-i18n-placeholder="login.username_ph" />
        </div>

        <div class="form-group">
          <label for="password" data-i18n="login.password_label">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            placeholder="••••••••"
            data-i18n-placeholder="login.password_ph" />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn" data-i18n="login.button">
          Login
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider" data-i18n="login.divider">or</div>

      <!-- Google Sign-In button rendered by Google Identity Services -->
      <!-- Replace YOUR_GOOGLE_CLIENT_ID with your actual Client ID -->
      <div id="g_id_onload" data-client_id="261834890802-qjjlpl6ftfio5hjv4alql89rrdasrl0k.apps.googleusercontent.com"
        data-callback="handleGoogleLogin" data-auto_prompt="false">
      </div>
      <div class="google-btn-wrapper">
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with"
          data-shape="rectangular" data-width="348">
        </div>
      </div>

      <p id="google-error-msg" class="msg error" style="display:none;"></p>

      <p class="auth-switch">
        <span data-i18n="login.no_account">Don't have an account?</span>
        <a href="/register.html" data-i18n="login.register_anchor">Register here</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { initNav, isLoggedIn } from "./js/main.js";
    import { api, saveAuthData } from "./js/api.js";
    import { i18n } from "./js/i18n.js";

    // Already logged in → redirect home
    if (isLoggedIn()) window.location.href = "/index.html";

    i18n.init();
    initNav();

    // Inline login logic (auth.js handles the form submit)
    import("./js/auth.js");

    // Show loading state on submit
    document.getElementById("login-form").addEventListener("submit", () => {
      document.getElementById("login-btn").textContent = i18n.t("login.logging_in");
    }, { once: true });

    // Google Identity Services callback — must be a global function
    window.handleGoogleLogin = async function (googleResponse) {
      const googleErrorEl = document.getElementById("google-error-msg");
      googleErrorEl.style.display = "none";
      try {
        const data = await api.post("/auth/google/", {
          credential: googleResponse.credential,
        });
        saveAuthData(data);
        window.location.href = "/index.html";
      } catch (err) {
        googleErrorEl.textContent = err.message || i18n.t("login.google_error");
        googleErrorEl.style.display = "";
      }
    };
  </script>

</body>

</html>
