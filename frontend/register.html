<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Mother's Recipe</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <nav class="navbar">
    <a href="/index.html" class="nav-logo">🍲 Mother's Recipe</a>
    <div id="nav-links"></div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <h1>Create an account 🍳</h1>
      <p class="auth-subtitle">Join our community and start sharing recipes today.</p>

      <p id="error-msg" class="msg error" style="display:none;"></p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            autocomplete="username"
            placeholder="choose_a_username"
          />
        </div>

        <div class="form-group">
          <label for="email">Email <span class="optional">(optional)</span></label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="new-password"
            placeholder="At least 8 characters"
            minlength="8"
          />
        </div>

        <div class="form-group">
          <label for="password2">Confirm Password</label>
          <input
            type="password"
            id="password2"
            name="password2"
            required
            autocomplete="new-password"
            placeholder="Repeat your password"
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          Create Account
        </button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/login.html">Login here</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/main.js";
    import { isLoggedIn } from "./js/api.js";

    if (isLoggedIn()) window.location.href = "/index.html";

    initNav();
    import("./js/auth.js");

    document.getElementById("register-form").addEventListener("submit", () => {
      document.getElementById("register-btn").textContent = "Creating account…";
    }, { once: true });
  </script>

</body>
</html>
