<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Recipe — Mother's Recipe</title>
  <link rel="stylesheet" href="/css/style.css" />

  <!--
    Cloudinary Upload Widget script.
    This lets the browser upload images DIRECTLY to Cloudinary
    without going through your backend — fast and saves server bandwidth.
  -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>

<body>

  <nav class="navbar">
    <a href="/index.html" class="nav-logo" data-i18n="nav.logo">🍲 Mother's Recipe</a>
    <div id="nav-links"></div>
  </nav>

  <main class="container form-page">
    <h1 id="page-title" data-i18n="recipe.add_title">Add a New Recipe</h1>
    <p id="error-msg" class="msg error" style="display:none;"></p>
    <p id="success-msg" class="msg success" style="display:none;"></p>

    <form id="recipe-form" novalidate>

      <!-- Basic Info -->
      <section class="form-section">
        <h2 data-i18n="recipe.section_basic">Basic Info</h2>

        <div class="form-group">
          <label for="title" data-i18n="recipe.label_title">Recipe Title *</label>
          <input type="text" id="title" required
            placeholder="e.g. Tom Yum Soup"
            data-i18n-placeholder="recipe.ph_title" />
        </div>

        <div class="form-group">
          <label for="description" data-i18n="recipe.label_desc">Description *</label>
          <textarea id="description" rows="3" required
            placeholder="Briefly describe the dish and its origin…"
            data-i18n-placeholder="recipe.ph_desc"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cooking_time" data-i18n="recipe.label_time">Cooking Time (minutes) *</label>
            <input type="number" id="cooking_time" min="1" required
              placeholder="30"
              data-i18n-placeholder="recipe.ph_time" />
          </div>
          <div class="form-group">
            <label for="difficulty" data-i18n="recipe.label_diff">Difficulty *</label>
            <select id="difficulty" required>
              <option value="" data-i18n="recipe.diff_select">Select…</option>
              <option value="easy"   data-i18n="recipe.diff_easy">Easy</option>
              <option value="medium" data-i18n="recipe.diff_medium">Medium</option>
              <option value="hard"   data-i18n="recipe.diff_hard">Hard</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Image Upload via Cloudinary -->
      <section class="form-section">
        <h2 data-i18n="recipe.section_photo">Recipe Photo</h2>
        <p class="form-hint" data-i18n="recipe.photo_hint">
          Upload directly to Cloudinary. The image URL is automatically saved when you submit.
        </p>

        <div class="upload-area">
          <img id="image-preview" src="" alt="" style="display:none;" />
          <button type="button" id="upload-btn" class="btn btn-outline" data-i18n="recipe.upload_btn">
            📷 Upload Photo
          </button>
          <p id="upload-status" class="form-hint"></p>
        </div>
        <!-- Hidden field — filled after Cloudinary upload -->
        <input type="hidden" id="image_url" />
      </section>

      <!-- Ingredients -->
      <section class="form-section">
        <h2 data-i18n="recipe.section_ingr">Ingredients</h2>
        <p class="form-hint" data-i18n="recipe.ingr_hint">Add each ingredient on its own line.</p>
        <div id="ingredients-container">
          <div class="dynamic-field">
            <input type="text" class="ingredient-input"
              placeholder="e.g. 2 cups jasmine rice"
              data-i18n-placeholder="recipe.ingr_ph" />
            <button type="button" class="btn-remove" onclick="removeField(this)">✕</button>
          </div>
        </div>
        <button type="button" id="add-ingredient" class="btn btn-secondary btn-sm" data-i18n="recipe.add_ingr_btn">
          + Add Ingredient
        </button>
      </section>

      <!-- Steps -->
      <section class="form-section">
        <h2 data-i18n="recipe.section_steps">Instructions</h2>
        <p class="form-hint" data-i18n="recipe.steps_hint">Add each step in order.</p>
        <div id="steps-container">
          <div class="dynamic-field">
            <textarea class="step-input" rows="2"
              placeholder="Step 1: …"
              data-i18n-placeholder="recipe.step_ph"
              data-i18n-n="1"></textarea>
            <button type="button" class="btn-remove" onclick="removeField(this)">✕</button>
          </div>
        </div>
        <button type="button" id="add-step" class="btn btn-secondary btn-sm" data-i18n="recipe.add_step_btn">
          + Add Step
        </button>
      </section>

      <div class="form-actions">
        <a href="/index.html" class="btn btn-outline" data-i18n="recipe.cancel_btn">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submit-btn" data-i18n="recipe.save_btn">Save Recipe</button>
      </div>
    </form>
  </main>

  <script type="module">
    import { api, isLoggedIn, getUser } from "./js/api.js";
    import { initNav } from "./js/main.js";
    import { i18n } from "./js/i18n.js";

    // Redirect anonymous users
    if (!isLoggedIn()) window.location.href = "/login.html";

    i18n.init();
    initNav();

    // ── Check if we're editing an existing recipe ─────────────────────────
    const params = new URLSearchParams(window.location.search);
    const editId = params.get("id");
    let existingRecipe = null;

    if (editId) {
      document.getElementById("page-title").textContent = i18n.t("recipe.edit_title");
      document.getElementById("submit-btn").textContent = i18n.t("recipe.update_btn");
      loadExistingRecipe(editId);
    }

    async function loadExistingRecipe(id) {
      try {
        existingRecipe = await api.get(`/recipes/${id}/`);
        const user = getUser();
        // Only the owner can edit
        if (existingRecipe.created_by.id !== user.id) {
          window.location.href = `/recipe-detail.html?id=${id}`;
          return;
        }
        prefillForm(existingRecipe);
      } catch (err) {
        alert(i18n.t("recipe.load_fail", { error: err.message }));
      }
    }

    function prefillForm(recipe) {
      document.getElementById("title").value = recipe.title;
      document.getElementById("description").value = recipe.description;
      document.getElementById("cooking_time").value = recipe.cooking_time;
      document.getElementById("difficulty").value = recipe.difficulty;
      document.getElementById("image_url").value = recipe.image_url;

      if (recipe.image_url) {
        const preview = document.getElementById("image-preview");
        preview.src = recipe.image_url;
        preview.style.display = "block";
        document.getElementById("upload-status").textContent = i18n.t("recipe.image_loaded");
      }

      // Prefill ingredients
      const ingCon = document.getElementById("ingredients-container");
      ingCon.innerHTML = "";
      recipe.ingredients.forEach((val) => addField("ingredients-container", "ingredient-input", val));

      // Prefill steps
      const stepCon = document.getElementById("steps-container");
      stepCon.innerHTML = "";
      recipe.steps.forEach((val) => addStepField(val));
    }

    // ── Cloudinary Upload Widget ──────────────────────────────────────────
    //
    // IMPORTANT: Replace 'YOUR_CLOUD_NAME' and 'YOUR_UNSIGNED_PRESET' below.
    //
    // To create an unsigned upload preset:
    //   1. Go to cloudinary.com → Settings → Upload
    //   2. Scroll to "Upload presets" → Add upload preset
    //   3. Set "Signing mode" to "Unsigned"
    //   4. Copy the preset name
    //
    const CLOUD_NAME = "dpxj3wz9w";    // ← replace this
    const UPLOAD_PRESET = "mothers_recipe_preset"; // ← replace this

    const widget = cloudinary.createUploadWidget(
      {
        cloudName: CLOUD_NAME,
        uploadPreset: UPLOAD_PRESET,
        sources: ["local", "camera", "url"],
        multiple: false,
        maxFileSize: 5000000,   // 5 MB limit
        cropping: false,
        resourceType: "image",
        folder: "mothers-recipe",
      },
      (error, result) => {
        if (error) {
          document.getElementById("upload-status").textContent =
            i18n.t("recipe.upload_fail", { error: error.message });
          return;
        }
        if (result.event === "success") {
          const url = result.info.secure_url;
          document.getElementById("image_url").value = url;
          document.getElementById("upload-status").textContent = i18n.t("recipe.upload_ok");
          const preview = document.getElementById("image-preview");
          preview.src = url;
          preview.style.display = "block";
        }
      }
    );

    document.getElementById("upload-btn").addEventListener("click", () => widget.open());

    // ── Dynamic ingredient / step fields ─────────────────────────────────

    function addField(containerId, className, value = "") {
      const container = document.getElementById(containerId);
      const div = document.createElement("div");
      div.className = "dynamic-field";
      const input = document.createElement("input");
      input.type = "text";
      input.className = className;
      input.value = value;
      input.dataset.i18nPlaceholder = "recipe.item_ph";
      input.placeholder = i18n.t("recipe.item_ph");
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn-remove";
      removeBtn.textContent = "✕";
      removeBtn.setAttribute("onclick", "removeField(this)");
      div.appendChild(input);
      div.appendChild(removeBtn);
      container.appendChild(div);
    }

    function addStepField(value = "") {
      const container = document.getElementById("steps-container");
      const index = container.children.length + 1;
      const div = document.createElement("div");
      div.className = "dynamic-field";
      const ta = document.createElement("textarea");
      ta.className = "step-input";
      ta.rows = 2;
      ta.value = value;
      ta.dataset.i18nPlaceholder = "recipe.step_ph";
      ta.dataset.i18nN = index;
      ta.placeholder = i18n.t("recipe.step_ph", { n: index });
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn-remove";
      removeBtn.textContent = "✕";
      removeBtn.setAttribute("onclick", "removeField(this)");
      div.appendChild(ta);
      div.appendChild(removeBtn);
      container.appendChild(div);
    }

    // Expose to onclick attributes
    window.removeField = (btn) => btn.closest(".dynamic-field").remove();

    document.getElementById("add-ingredient").addEventListener("click", () =>
      addField("ingredients-container", "ingredient-input")
    );
    document.getElementById("add-step").addEventListener("click", () => addStepField());

    // ── Re-render on language change ──────────────────────────────────────
    document.addEventListener("i18n:langchange", () => {
      if (editId) {
        document.getElementById("page-title").textContent = i18n.t("recipe.edit_title");
        document.getElementById("submit-btn").textContent = i18n.t("recipe.update_btn");
      }
      // Re-number dynamic step placeholders
      document.querySelectorAll(".step-input").forEach((el, idx) => {
        el.dataset.i18nN = idx + 1;
        el.placeholder = i18n.t("recipe.step_ph", { n: idx + 1 });
      });
    });

    // ── Form submission ───────────────────────────────────────────────────
    document.getElementById("recipe-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");
      errorEl.style.display = "none";
      successEl.style.display = "none";

      // Collect dynamic ingredient inputs
      const ingredients = Array.from(
        document.querySelectorAll(".ingredient-input")
      )
        .map((i) => i.value.trim())
        .filter(Boolean);

      // Collect dynamic step textareas
      const steps = Array.from(
        document.querySelectorAll(".step-input")
      )
        .map((t) => t.value.trim())
        .filter(Boolean);

      const payload = {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        cooking_time: parseInt(document.getElementById("cooking_time").value),
        difficulty: document.getElementById("difficulty").value,
        image_url: document.getElementById("image_url").value,
        ingredients,
        steps,
      };

      // Basic client-side validation
      if (!payload.title || !payload.description || !payload.cooking_time || !payload.difficulty) {
        errorEl.textContent = i18n.t("recipe.err_fields");
        errorEl.style.display = "block";
        return;
      }
      if (ingredients.length === 0) {
        errorEl.textContent = i18n.t("recipe.err_ingr");
        errorEl.style.display = "block";
        return;
      }
      if (steps.length === 0) {
        errorEl.textContent = i18n.t("recipe.err_steps");
        errorEl.style.display = "block";
        return;
      }

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = i18n.t("recipe.saving");

      try {
        let recipe;
        if (editId) {
          recipe = await api.put(`/recipes/${editId}/`, payload);
        } else {
          recipe = await api.post("/recipes/", payload);
        }
        successEl.textContent = i18n.t("recipe.saved");
        successEl.style.display = "block";
        setTimeout(() => {
          window.location.href = `/recipe-detail.html?id=${recipe.id}`;
        }, 1200);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = editId ? i18n.t("recipe.update_btn") : i18n.t("recipe.save_btn");
      }
    });
  </script>

</body>

</html>
